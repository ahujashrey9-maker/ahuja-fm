<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ahuja FM</title>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:40px;
}

button{
  padding:15px 40px;
  font-size:20px;
  cursor:pointer;
}

#nowPlaying{
  margin-top:30px;
  font-size:22px;
}

#status{
  margin-top:20px;
  color:#aaa;
}
</style>
</head>

<body>

<h1>🎵 AHUJA FM</h1>

<button onclick="startRadio()">
▶ PLAY RADIO
</button>

<div id="status">Ready...</div>

<div id="nowPlaying"></div>

<audio id="player"></audio>

<script>

const REPO =
"https://raw.githubusercontent.com/ahujashrey9-maker/ahuja-fm/main";

let config = {};
let musicFiles = [];
let announcements = [];

let started = false;
let announcementIndex = 0;
let lastMusicFile = "";
let lastAnnouncementTime = Date.now();

const player =
document.getElementById("player");

async function startRadio(){

  if(started) return;

  started = true;

  try{

    const configData =
    await fetch("config.json")
    .then(r => r.json());

    const musicData =
    await fetch("music.json")
    .then(r => r.json());

    config = configData;

    musicFiles =
    musicData.songs || [];

    announcements =
    config.announcements || [];

    document.getElementById("status").innerHTML =
    "🟢 Ahuja FM Live";

    playMusic();

  }catch(error){

    console.error(error);

    document.getElementById("status").innerHTML =
    "❌ Startup Error";
  }
}

function getRandomSong(){

  let song;

  do{

    song =
    musicFiles[
      Math.floor(
        Math.random() *
        musicFiles.length
      )
    ];

  }while(
    musicFiles.length > 1 &&
    song === lastMusicFile
  );

  lastMusicFile = song;

  return song;
}

function playMusic(){

  const file =
  getRandomSong();

  player.volume =
  config.musicVolume ?? 0.03;

  player.src =
  REPO +
  "/music/" +
  encodeURIComponent(file);

  document.getElementById("nowPlaying").innerHTML =
  "🎵 " + file;

  player.play();

  player.onended = function(){

    const elapsedMinutes =
    (Date.now() -
    lastAnnouncementTime)
    / 60000;

    if(
      elapsedMinutes >=
      (config.announcementIntervalMinutes || 5)
    ){

      playAnnouncement();

    }else{

      playMusic();
    }
  };

  player.onerror = function(){

    console.log(
      "Skipped Music:",
      file
    );

    playMusic();
  };
}

function playAnnouncement(){

  if(
    announcements.length === 0
  ){

    playMusic();
    return;
  }

  const file =
  announcements[
    announcementIndex
  ];

  announcementIndex =
  (announcementIndex + 1)
  % announcements.length;

  player.volume =
  config.announcementVolume ?? 1.0;

  player.src =
  REPO +
  "/announcements/" +
  encodeURIComponent(file);

  document.getElementById("nowPlaying").innerHTML =
  "📢 " + file;

  lastAnnouncementTime =
  Date.now();

  player.play();

  player.onended = function(){

    playMusic();
  };

  player.onerror = function(){

    console.log(
      "Skipped Announcement:",
      file
    );

    playMusic();
  };
}


</script>

</body>
</html>
